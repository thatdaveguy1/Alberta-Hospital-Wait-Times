# newsyslog rotation for AlbertaHospitals LaunchAgent logs.
# Install manually by copying/linking into a newsyslog.d directory the system
# is configured to read, e.g.:
#   sudo cp ops/newsyslog/alberta-hospitals.conf /etc/newsyslog.d/
#   sudo newsyslog -v
#
# Or run as part of local log maintenance:
#   sudo newsyslog -f /path/to/this/conf
#
# Paths below are absolute because newsyslog resolves them at runtime.

# Server KeepAlive stdout/stderr
# N = no syslogd signal; Z = gzip compress rotated archive.
